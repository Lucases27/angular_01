<div class="bg-dark border-right p-3" id="sidebar">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h3 class="text-light m-0">GifsApp</h3>
    <button
      (click)="toggleTheme()"
      class="btn btn-sm btn-outline-light"
      [title]="(theme$ | async) === 'dark' ? 'Light mode' : 'Dark mode'">
      <span *ngIf="(theme$ | async) === 'dark'">☀️</span>
      <span *ngIf="(theme$ | async) === 'light'">🌙</span>
    </button>
  </div>
  <hr class="text-white">

  <div class="list-group list-reset">
    <button *ngFor="let tag of getTagHistory()"
            (click)="searchTag(tag)"
            class="list-group-item list-group-item-action">
      {{ tag | titlecase }}
    </button>
  </div>
  <div class="text-light">

  </div>




</div>
